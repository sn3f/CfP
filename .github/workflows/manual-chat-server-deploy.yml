name: Manual - Build and Push Chat Server to AWS ECR

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'The branch, tag, or SHA to build from'
        required: true
        default: 'main'

jobs:
  build-and-push-chat-server:
    runs-on: ubuntu-latest
    environment: aws

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./chat-server
          push: true
          build-args: ${{ steps.docker-build-args.outputs.args }}
          tags: |
            ${{ secrets.ECR_REGISTRY }}/chat-server:${{ github.sha }}
            ${{ secrets.ECR_REGISTRY }}/chat-server:latest
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.ECR_REGISTRY }}/chat-server:buildcache
          cache-to: type=registry,ref=${{ secrets.ECR_REGISTRY }}/chat-server:buildcache,mode=max