name: CfP Weekly Scan

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit results/latest.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python with uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: cfp-agent
        run: uv pip install --system -r pyproject.toml

      - name: Run CfP scanner
        working-directory: cfp-agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLASSIFIER_MODEL: "google/gemini-2.0-flash-001"
          MAX_CFPS_PER_SOURCE: "20"
          REQUEST_DELAY_SECONDS: "2"
        run: python main.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cfp-agent/results/latest.json
          git diff --staged --quiet || git commit -m "chore: weekly CfP scan $(date -u '+%Y-%m-%d')"
          git push
