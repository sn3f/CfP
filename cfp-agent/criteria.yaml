criteria:
  - id: 1
    fieldName: "ILO Eligibility"
    hard: true
    evaluationLogic: >
      The ILO is a UN intergovernmental organization (IGO / UN specialized agency). It is NOT
      a company, private firm, NGO, CSO, civil-society organisation, university, research
      institute, government agency, ministry, sub-national authority, or local entity.

      Determine eligibility as follows:

      (1) If the text names eligible applicant CATEGORIES (e.g. "companies", "private sector",
      "for-profit entities", "NGOs", "CSOs", "civil society organisations", "non-profit
      organisations", "research institutes", "universities", "national/local authorities",
      "domestic NGOs", "local organisations"), treat that list as EXHAUSTIVE. Set status="true"
      ONLY if the list explicitly includes one of: "UN agencies", "United Nations entities",
      "UN specialized agencies", "international organisations", "intergovernmental organisations",
      "IGOs", "multilateral organisations", "multilateral agencies", "international institutions",
      or an equivalent. Otherwise set status="false". A list of "companies" or "civil society"
      that does not explicitly name UN/IGOs means status="false", even without explicit ban.

      (2) Geographic language ("open to all countries", "applicants from any country", "global
      call", "worldwide") refers to the COUNTRY of the applicant, NOT to the entity type. NEVER
      use geographic openness to infer that ILO is eligible.

      (3) Set status="true" only when the text is GENUINELY silent on applicant entity types
      AND nothing in the funding nature constrains applicants to a non-IGO category (e.g. a
      domestic subsidy scheme, a retail grant, a for-profit investment vehicle).

      (4) When the text is silent on entity types but the call's framing is clearly aimed at
      private-sector / civil-society / local-entity beneficiaries (e.g. "private sector
      development", "support to local NGOs", "subsidies to road owners") set status="false".

  - id: 2
    fieldName: "Funding instrument is grant"
    hard: true
    evaluationLogic: >
      Exclude if the funding creates a financial liability (debt, equity, or repayment obligation)
      for the applicant. Include ONLY if there is a non-reimbursable component (e.g., grant,
      non-repayable contribution, cooperative agreement) available. If the opportunity is purely
      for loans, guarantees, or investment capital without a separate grant window, EXCLUDE.

  - id: 3
    fieldName: "Grant size above threshold"
    hard: true
    evaluationLogic: >
      Exclude if the maximum stated grant size is below USD 50,000.

  - id: 4
    fieldName: "Deadline is future"
    hard: true
    evaluationLogic: >
      Exclude if any mandatory submission deadline has passed. Pay close attention to multi-stage
      processes (e.g., Expression of Interest, Concept Note) and exclude if the deadline for the
      first required step is in the past, even if the final deadline is in the future.

  - id: 5
    fieldName: "Is procurement or tender"
    hard: false
    evaluationLogic: >
      Flag if the call appears to be for procurement of goods/services or a consultancy tender
      rather than a project grant. Look for terms like Request for Proposal (RFP), Invitation
      to Bid (ITB), consultant, services.

  - id: 6
    fieldName: "Requires cofinancing"
    hard: false
    evaluationLogic: >
      Flag only if co-financing or cost-sharing is a mandatory, required condition for the
      application. Do not flag if it is merely mentioned as optional, encouraged, an asset,
      or a positive factor.

  - id: 7
    fieldName: "Requires specific accreditation"
    hard: false
    evaluationLogic: >
      Flag if the applicant must have a specific pre-existing accreditation with another body
      (e.g., GEF, CIF, Green Climate Fund).

  - id: 8
    fieldName: "Has consortium leadership rules"
    hard: false
    evaluationLogic: >
      Flag if the rules state that any consortium or partnership must be led by a non-UN entity.

  - id: 9
    fieldName: "Applicant origin is restricted"
    hard: false
    evaluationLogic: >
      Flag if eligibility is restricted to applicants legally registered or based in the
      donor domestic territory only.

  - id: 10
    fieldName: "Is open call with active application window"
    hard: true
    evaluationLogic: >
      Confirm that the page describes a real, currently-open Call for Proposals — NOT an
      aggregator/index page, a news announcement of a future programme, a perpetual
      administrative scheme aimed at retail beneficiaries, or a finished call with results
      published.

      Set status="true" ONLY when BOTH conditions hold:
      (a) The page describes a SINGLE specific call (one funding window, one set of eligibility
      rules, one deadline or rolling window) — not a list of multiple opportunities.
      (b) There is an explicit application mechanism (online application form, grants portal,
      EOI/concept-note submission, dedicated email with template) AND either a future deadline
      or an explicit "currently accepting applications" statement.

      Set status="false" if the page is:
      - An aggregator/landing/index page listing many opportunities;
      - A news/press release announcing a future call without an open application;
      - A perpetual or open-ended scheme aimed at retail beneficiaries (e.g. domestic
        subsidies, grants for individuals, infrastructure-owner reimbursements);
      - A finished call with awards already announced;
      - A general programme description without a concrete current application round.
