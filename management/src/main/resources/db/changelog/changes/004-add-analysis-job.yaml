databaseChangeLog:
  - changeSet:
      id: add-analysis-job-entity
      author: SolDevelo
      changes:
        - createTable:
            tableName: analysis_job
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: scrap_result_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: result_id
                  type: BIGINT
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            constraintName: fk_analysis_job_scrap_result
            baseTableName: analysis_job
            baseColumnNames: scrap_result_id
            referencedTableName: scrap_result
            referencedColumnNames: id
            onUpdate: RESTRICT
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            constraintName: fk_analysis_job_result
            baseTableName: analysis_job
            baseColumnNames: result_id
            referencedTableName: cfp_analysis
            referencedColumnNames: id
            onUpdate: RESTRICT
            onDelete: SET NULL
  - changeSet:
      id: add-analysis-job-reference-in-analysis
      author: SolDevelo
      changes:
        - addColumn:
            tableName: cfp_analysis
            columns:
              - column:
                  name: analysis_job_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            constraintName: fk_analysis_analysis_job
            baseTableName: cfp_analysis
            baseColumnNames: analysis_job_id
            referencedTableName: analysis_job
            referencedColumnNames: id
            onUpdate: RESTRICT
            onDelete: SET NULL
        - dropColumn:
            tableName: cfp_analysis
            columnName: content