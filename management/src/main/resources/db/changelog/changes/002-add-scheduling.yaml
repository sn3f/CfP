databaseChangeLog:
  - changeSet:
      id: replace-scrap-execution-id-with-scrap-job
      author: SolDevelo
      comment: >
        Refactors scrap_result.scrap_execution_id to scrap_job_id via creating scrap_job table,
        migrating data, and adding foreign keys.

      changes:
        - createTable:
            tableName: scrap_job
            columns:
              - column:
                  name: id
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: source_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: request_message
                  type: TEXT

        - addForeignKeyConstraint:
            baseColumnNames: source_id
            baseTableName: scrap_job
            constraintName: fk_scrap_job_source
            referencedColumnNames: id
            referencedTableName: cfp_source
            onDelete: RESTRICT
            onUpdate: RESTRICT

        - sql:
            dbms: postgresql
            endDelimiter: ;
            splitStatements: true
            stripComments: true
            sql: |
              INSERT INTO scrap_job (id, source_id, request_message)
              SELECT DISTINCT
                  sr.scrap_execution_id,
                  cs.id AS source_id,
                  NULL AS request_message
              FROM
                  scrap_result sr
              INNER JOIN
                  cfp_source cs ON sr.url LIKE (REGEXP_REPLACE(website_url, '^(https?:\/\/[^\/]+).*', '\1') || '%')

        - renameColumn:
            columnDataType: VARCHAR(255)
            newColumnName: scrap_job_id
            oldColumnName: scrap_execution_id
            tableName: scrap_result

        - addNotNullConstraint:
            columnDataType: VARCHAR(255)
            columnName: scrap_job_id
            tableName: scrap_result

        - addForeignKeyConstraint:
            baseColumnNames: scrap_job_id
            baseTableName: scrap_result
            constraintName: fk_scrap_result_scrap_job
            referencedColumnNames: id
            referencedTableName: scrap_job
            onDelete: CASCADE
            onUpdate: RESTRICT

  - changeSet:
      id: replace-scrap-job-request_message-with-config
      author: SolDevelo
      changes:
        - addColumn:
            tableName: scrap_job
            columns:
              - column:
                  name: config
                  type: jsonb
        - dropColumn:
            tableName: scrap_job
            columnName: request_message

  - changeSet:
      id: add-created-at-to-scrap-job
      author: SolDevelo
      changes:
        - addColumn:
            tableName: scrap_job
            columns:
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE

  - changeSet:
      id: add-classification-to-cfp_source
      author: SolDevelo
      changes:
        - addColumn:
            tableName: cfp_source
            columns:
              - column:
                  name: classification
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
        - update:
            tableName: cfp_source
            columns:
              - column:
                  name: classification
                  value: MANUAL
        - addNotNullConstraint:
            tableName: cfp_source
            columnName: classification
            columnDataType: VARCHAR(255)