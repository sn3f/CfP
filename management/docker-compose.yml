services:
  db:
    image: postgres:13.22
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U management -d managementdb" ]
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - local-cfp-net

  management:
    build: .
    env_file:
      - ../.env
    ports:
      - "8080:8080"
      - "5005:5005"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - local-cfp-net

volumes:
  postgres-data:

networks:
  local-cfp-net:
    name: local-cfp-net
    driver: bridge